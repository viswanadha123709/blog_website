{% extends "base.html" %}

{% block header %}
<a href="{% url 'main' %}" class="btn">main page</a>
{% endblock %}

{% block content %}
<style>
    .title-box {
        width: 100%;
        height: 70px;
        background: #2D333B;
        color: white;
        border: 1px solid #444C56;
        border-radius: 6px;
        padding: 10px;
        box-sizing: border-box;
    }

    .content-box {
        width: 100%;
        height: 280px;
        background: #2D333B;
        color: white;
        border: 1px solid #444C56;
        border: 1px solid #444C56;
        border-radius: 6px;
        padding: 10px;
        box-sizing: border-box;
    }

    form textarea::placeholder {
        color: #8B949E;
    }

    .login-btn {
        width: 100%;
        height: 42px;
        margin-top: 8px;
        margin-bottom: 20px;
        background: #2D333B;
        color: white;
        border: 1px solid #444C56;
        border-radius: 6px;
        padding-left: 10px;
        box-sizing: border-box;
        cursor: pointer;
        background-color: rgb(24, 125, 9);
    }
</style>
<form method="POST">
    {% csrf_token %}

    <label>Author Name</label>
    <input type="text" name="author" placeholder="Enter your name" required>

    <label>Title</label>
    <textarea name="title" class="title-box" rows="3" placeholder="Enter title"></textarea>

    <label>Content</label>
    <textarea name="content" class="content-box" rows="15" placeholder="Write your content here"></textarea>
    <input type="submit" class="login-btn" value="publish">
</form>


{% endblock %}
