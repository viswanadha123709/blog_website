{% extends "base.html" %}
{% block header %}
<a href="{% url 'login' %}" class="btn">Login</a>
{% endblock %}
{% block content %}

<form method="POST">
    {% csrf_token %}

    <h2>Register</h2>

    <label for="new_username">Username</label>
    <input type="text" id="new_username" name="new_username" placeholder="create Username" required>

    <label for="new_password">Password</label>
    <input type="password" id="new_password" name="new_password" placeholder="create Password" required>

    <input type="submit" value="Register">

    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>rtr

</form>

{% endblock %}
